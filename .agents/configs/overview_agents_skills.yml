- name: openspec-plan
  description: OpenSpec Architect - Plan and specify software architecture. Allows
    creating and editing OpenSpec documents while keeping implementation code read-only.
  source: opencode-plugin-openspec
  mode: primary
  color: '#FF6B6B'
  permission:
    read:
      '*': allow
    edit:
      '*': deny
      project.md: allow
      AGENTS.md: allow
      openspec/**: allow
      specs/**: allow
    bash:
      '*': deny
      openspec: allow
      openspec *: allow
      grep *: allow
      ls: allow
      ls *: allow
      cat *: allow
      find *: allow
      echo: allow
      echo *: allow
      pwd: allow
      which *: allow
      env: allow
      printenv *: allow
      git status*: allow
      git log*: allow
      git diff*: allow
      git show*: allow
  skills: []
  installed_by_skills: []
