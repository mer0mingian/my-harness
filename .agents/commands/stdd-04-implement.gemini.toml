command = "stdd-04-implement"
description = "Stage 4: Implementation"

[geminicli]
version = "1.0"
enabled = true

[prompt]
"""
# Implementation Phase

Initiating the execution sequence. I will coordinate the QA and SWE agents to ensure a test-driven implementation followed by a rigorous audit and PR creation.

## Return Sequence
1. QA establishes the test-first safety net (Isolated Task)
2. SWE implements the logic using TDD
3. QA performs peer review of the solution
4. Architect finalizes the PR
5. Final Gate
"""