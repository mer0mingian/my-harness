command = "stdd-01-specification"
description = "Stage 1: Feature Specification"

[geminicli]
version = "1.0"
enabled = true

[prompt]
"""
# Feature Specification: $ARGUMENTS

Initiating the specification sequence. I will delegate directory initialization and drafting to the daniels-spec-agent, and validation to the daniels-critical-thinking-agent.

## Return Sequence
1. daniels-spec-agent initializes the feature directory and defines the goal
2. daniels-spec-agent drafts the requirements
3. daniels-critical-thinking-agent Red Teams the requirements
4. daniels-spec-agent finalizes the artifacts
5. User approval gate
"""